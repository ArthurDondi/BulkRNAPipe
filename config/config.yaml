# BulkRNAPipe configuration file
#
# Copy this file and edit it for your experiment before running the pipeline.
# Point --configfile to your copy when calling snakemake.

# ─── User paths ──────────────────────────────────────────────────────────────
User:
  # Directory that contains your raw FASTQ files (or SRA accessions – see below)
  input_dir: /path/to/fastq
  # All pipeline outputs will be written here
  output_dir: /path/to/output

# ─── Reference genome ────────────────────────────────────────────────────────
Reference:
  # Path to the genome FASTA (used to build the STAR index)
  genome_fasta: /path/to/genome.fa
  # Path to the gene annotation GTF (used for STAR index and featureCounts)
  gtf: /path/to/annotation.gtf
  # Directory where the STAR index will be stored (created automatically)
  star_index: /path/to/star_index
  # Genome name for reporting purposes (e.g. hg38, mm10, GRCh38)
  genome: hg38

# ─── Pipeline modules to enable ──────────────────────────────────────────────
Run:
  # Run FastQC + MultiQC on raw reads
  QC_raw: True
  # Run adapter and quality trimming with Trim Galore
  trim: True
  # Run FastQC + MultiQC on trimmed reads
  QC_trimmed: True
  # Align reads with STAR
  align: True
  # Quantify reads with featureCounts (Subread)
  quantify: True
  # Perform differential expression analysis with DESeq2
  deseq2: True
  # Run GSEA (fgsea) enrichment analysis per contrast
  gsea: False
  # Run GO enrichment analysis (clusterProfiler) per contrast
  go: False

# ─── Sequencing library ───────────────────────────────────────────────────────
Library:
  # True = paired-end reads, False = single-end reads
  paired_end: True
  # Expected read length (used to compute sjdbOverhang = read_length - 1 for STAR)
  read_length: 150
  # Strand specificity for featureCounts:
  #   0 = unstranded, 1 = stranded, 2 = reversely stranded (dUTP/TruSeq)
  strandedness: 2

# ─── Samples ─────────────────────────────────────────────────────────────────
# Each entry key is the sample name used throughout the pipeline.
# condition: label used for grouping in DESeq2
# R1 / R2: FASTQ file names relative to input_dir (just the filename, no path)
#   For single-end data, omit R2 (or leave it as an empty string "").
#   For SRA data, leave R1/R2 blank and add an "sra" field with the SRR accession.
samples:
  ctrl_1:
    condition: control
    R1: ctrl_1_R1.fastq.gz
    R2: ctrl_1_R2.fastq.gz
  ctrl_2:
    condition: control
    R1: ctrl_2_R1.fastq.gz
    R2: ctrl_2_R2.fastq.gz
  treat_1:
    condition: treatment
    R1: treat_1_R1.fastq.gz
    R2: treat_1_R2.fastq.gz
  treat_2:
    condition: treatment
    R1: treat_2_R1.fastq.gz
    R2: treat_2_R2.fastq.gz

# ─── DESeq2 contrasts ────────────────────────────────────────────────────────
# List the pairwise comparisons DESeq2 should perform.
# Each entry: [name, numerator_condition, denominator_condition]
DESeq2:
  contrasts:
    - [treatment_vs_control, treatment, control]

  # ─── Combined / derived conditions (optional) ──────────────────────────────
  # Merge two or more existing condition labels into one new label for DESeq2
  # grouping.  Samples are NOT averaged; they remain separate replicates —
  # only their condition label is changed before DESeq2 sees the data.
  #
  # Example: pool a "no-vector" and an "empty-vector" control group together
  # and run contrasts against the combined reference:
  #
  #   combine_conditions:
  #     vector_control:          # new combined condition name
  #       - no_vector            # existing condition label
  #       - empty_vector         # existing condition label
  #
  # Then add contrasts that reference the combined name as numerator or
  # denominator, e.g.:
  #   - [treatment_vs_vector_control, treatment, vector_control]
  #
  # Rules enforced at startup:
  #   - The combined name must not collide with any existing condition label.
  #   - Every source condition must exist in at least one sample.
  #   - A source condition may appear in multiple combined groups, as long as
  #     those groups are not both used as numerator/denominator in the same
  #     contrast (ambiguous remapping).
  #   - A raw condition used as one side of a contrast must not also be a source
  #     member of the combined group on the other side (samples would fall on
  #     both sides simultaneously).
  #
  # Omit (or leave as {}) to run the pipeline without any condition merging.
  combine_conditions: {}

  # Adjusted p-value threshold for volcano plots and result tables
  padj_threshold: 0.05
  # Absolute log2 fold-change threshold for volcano plots
  lfc_threshold: 1.0

# ─── Optional proteomics limma overlay for DESeq2 volcano plots ──────────────
# When enabled, the DESeq2 volcano for each contrast is filtered to genes that
# are significant in the mapped proteomics comparison (FDR <= fdr_threshold).
# Significant RNA points are labelled and coloured by RNA/protein direction:
#   - green: same direction (both up or both down)
#   - red: opposite direction
Proteomics:
  enabled: False
  limma_xlsx: /path/to/251128_limmaResult_IP_MRa_051_LFQ_Experiment1_V3_filtered-KK.xlsx
  sheet: "limma result"
  gene_column: "Gene"
  comparison_column: "Comparison"
  fdr_column: "FDR"
  logfc_column: "logFC"
  fdr_threshold: 0.05
  # Map DESeq2 contrast name -> proteomics comparison value in the sheet
  deseq2_to_proteomics_comparison: {}
  # Example:
  # deseq2_to_proteomics_comparison:
  #   ATRX_IFF_vs_ATRX_FL: "IFF_vs_FL"
  #   ATRX_Ctrl_vs_ATRX_IFF: "IFF_vs_Ctrl"

# ─── GSEA parameters ─────────────────────────────────────────────────────────
# Requires Run.gsea: True
GSEA:
  # MSigDB collections to fetch via msigdbr.
  # Each entry can be:
  #   - "H"              (Hallmark)
  #   - "C2:CP:REACTOME" (Reactome curated pathways)
  #   - "C5:GO:BP"       (GO Biological Process)
  # Format: "CATEGORY" or "CATEGORY:SUBCATEGORY"
  collections:
    - H
    - C2:CP:REACTOME
    - C5:GO:BP
  # Minimum gene set size (genes in the ranked list)
  min_size: 15
  # Maximum gene set size
  max_size: 500
  # nPermSimple: passed to fgseaMultilevel as the number of permutations used for
  # the simple (Monte-Carlo) estimate that seeds the multilevel algorithm.
  # Higher values improve precision at the cost of speed.
  nperm: 1000
  # Ranking metric: "stat" (DESeq2 Wald stat, recommended) or "log2FoldChange"
  rank_metric: stat
  # Optional additional GMT files to merge with msigdbr gene sets.
  # Paths can be absolute or relative to the pipeline working directory.
  # The auto-generated HOX GMT is always included automatically.
  # Leave empty ([]) to use only msigdbr + HOX sets.
  custom_gmt_files: []

# ─── GO enrichment parameters ────────────────────────────────────────────────
# Requires Run.go: True
GO:
  # Ontologies to test. Any combination of BP, MF, CC.
  ontology:
    - BP
  # Adjusted p-value cutoff for GO results table and plots
  padj_cutoff: 0.05
  # Minimum gene set size for GO terms
  min_gs_size: 10
  # Maximum gene set size for GO terms
  max_gs_size: 500
  # Gene ID type in your results table (SYMBOL is the default for this pipeline)
  gene_id_type: SYMBOL

# ─── Contrast comparisons (GSEA ΔNES + residual rank) ───────────────────────
# Requires Run.gsea: True
# Define pairs of DESeq2 contrasts to compare.
# Each entry:
#   name:        label for output directory (gsea_compare/{name}/)
#   contrast_A:  name of the first contrast (numerator of comparison)
#   contrast_B:  name of the second contrast (denominator / baseline)
#   delta_nes:   True to compute ΔNES (NES_A - NES_B) per pathway
#   residual_rank: True to run fgsea on rank_A - rank_B residuals
ContrastComparisons: []
# Example:
#   ContrastComparisons:
#     - name: IFF_vs_FL_normalised_by_IFF_vs_Ctrl
#       contrast_A: ATRX_IFF_vs_ATRX_FL
#       contrast_B: ATRX_Ctrl_vs_ATRX_IFF
#       delta_nes: True
#       residual_rank: True

# ─── Tool parameters ─────────────────────────────────────────────────────────
TrimGalore:
  # Minimum read length to keep after trimming
  min_length: 20
  # Phred quality score threshold
  quality: 20
  # Extra arguments forwarded to Trim Galore (e.g. "--illumina" to force adapter)
  extra: ""

STAR:
  # Extra arguments forwarded to STAR genome generate
  index_extra: ""
  # Extra arguments forwarded to STAR aligner
  align_extra: ""

featureCounts:
  # Minimum mapping quality for a read to be counted
  min_mq: 10
  # Extra arguments forwarded to featureCounts
  extra: ""
