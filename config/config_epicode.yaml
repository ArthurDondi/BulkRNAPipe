# ─── DESeq2 contrasts ────────────────────────────────────────────────────────
# List the pairwise comparisons DESeq2 should perform.
# Each entry: [name, numerator_condition, denominator_condition]
DESeq2:
  contrasts:
    # Each contrast: [name_for_output, numerator, denominator(reference)]
    # Compare ATRX+ cell line vs. ATRX- (E6) cell line
    - [TP53_vs_E6, E6, TP53]
    # Compare E6 alone vs. E6 + empty vector
    - [E6_vs_EmptyVector, EmptyVector, E6]
    # Compare E6 + empty vector vs. E6 + ATRX full-length
    - [EmptyVector_vs_ATRX_FL, ATRX_FL, EmptyVector]
    # Compare empty vector vs. ATRX in-frame fusion
    - [EmptyVector_vs_ATRX_IFF, ATRX_IFF, EmptyVector]
    # Compare ATRX in-frame fusion vs. ATRX full-length (FL as reference)
    - [ATRX_FL_vs_ATRX_IFF, ATRX_IFF, ATRX_FL]
    # Compare ATRX+ cell line vs. ATRX in-frame fusion
    - [TP53_vs_ATRX_IFF, ATRX_IFF, TP53]
    # Compare ATRX+ cell line vs. ATRX FL (rescue experiment)
    - [TP53_vs_ATRX_FL, ATRX_FL, TP53]


  # ─── Combined / derived conditions ─────────────────────────────────────────
  # Optional: merge two or more existing condition labels into one new label
  # for DESeq2 grouping.  Samples are NOT averaged; they remain separate
  # replicates — only their condition label is changed.
  #
  # Rules:
  #   - The combined name must not collide with any existing condition label.
  #   - Every source condition must exist in at least one sample.
  #   - A source condition may appear in multiple combined groups, as long as
  #     those groups are not both used in the same contrast.
  #   - A raw condition used on one side of a contrast must not also be a source
  #     member of the combined group on the other side.
  combine_conditions:
    ATRX_Ctrl:
      - E6
      - EmptyVector

  # Adjusted p-value threshold for volcano plots and result tables
  padj_threshold: 0.05
  # Absolute log2 fold-change threshold for volcano plots
  lfc_threshold: 1.0

# ─── Optional proteomics limma overlay for separate proteomics volcano plots ──
Proteomics:
  enabled: True
  limma_xlsx: /home/arthur_d/bioinf_isilon/Research/TASCHNERMANDL/Internal/users/arthur_d/projects/epicode/251128_limmaResult_IP_MRa_051_LFQ_Experiment1_V3_filtered-KK.xlsx
  sheet: "limma result filtered"
  gene_column: "Gene"
  # Wide-format Excel: comparison_column is empty; logfc_column and fdr_column
  # are suffixes appended to the comparison name to form the actual column names
  # (e.g. "S1011_vs_control" + "_LOG2FC" → column "S1011_vs_control_LOG2FC").
  comparison_column: ""
  fdr_column: "_FDR"
  logfc_column: "_LOG2FC"
  fdr_threshold: 0.05
  # Sample code mapping used below:
  #   S1011 = ATRX_FL  |  S1744 = ATRX_IFF  |  S1760 = EmptyVector
  #   SE6   = E6  |  control = TP53
  #
  # Note: ATRX_Ctrl (DESeq2 combined NoVector+EmptyVector) has no direct
  # proteomics equivalent; the vs-control comparisons are the closest match.
  deseq2_to_proteomics_comparison:
    #TP53_vs_E6:       "SE6_vs_control"
    E6_vs_EmptyVector:  "S1760_vs_SE6"
    #EmptyVector_vs_ATRX_FL:        "S1011_vs_S1760"
    #EmptyVector_vs_ATRX_IFF:       "S1744_vs_S1760"
    ATRX_IFF_vs_ATRX_FL:                "S1744_vs_S1011"
    TP53_vs_ATRX_FL:               "S1011_vs_control" 
    TP53_vs_ATRX_IFF:              "S1744_vs_control"   

# ─── GSEA parameters ─────────────────────────────────────────────────────────
GSEA:
  collections:
    - H
    - C2:CP:REACTOME
    - C5:GO:BP
  min_size: 9
  max_size: 500
  nperm: 1000
  rank_metric: stat
  custom_gmt_files: []

# ─── GO enrichment parameters ────────────────────────────────────────────────
GO:
  ontology:
    - BP
  padj_cutoff: 0.05
  min_gs_size: 10
  max_gs_size: 500
  gene_id_type: SYMBOL

# ─── Contrast comparisons ────────────────────────────────────────────────────
# "Normalise" IFF-vs-FL by subtracting the IFF-vs-Ctrl baseline.
ContrastComparisons:
  - name: IFF_vs_FL_normalised_by_IFF_vs_Ctrl
    contrast_A: ATRX_FL_vs_ATRX_IFF
    contrast_B: TP53_vs_ATRX_IFF
    delta_nes: True
    residual_rank: True

# ─── Tool parameters ─────────────────────────────────────────────────────────
TrimGalore:
  # Minimum read length to keep after trimming
  min_length: 20
  # Phred quality score threshold
  quality: 20
  # Extra arguments forwarded to Trim Galore (e.g. "--illumina" to force adapter)
  extra: ""

STAR:
  # Extra arguments forwarded to STAR genome generate
  index_extra: ""
  # Extra arguments forwarded to STAR aligner
  align_extra: ""

featureCounts:
  # Minimum mapping quality for a read to be counted
  min_mq: 10
  # Extra arguments forwarded to featureCounts
  extra: ""
