# ─── DESeq2 contrasts ────────────────────────────────────────────────────────
# List the pairwise comparisons DESeq2 should perform.
# Each entry: [name, numerator_condition, denominator_condition]
DESeq2:
  contrasts:
    # Each contrast: [name_for_output, numerator, denominator(reference)]
    # Compare untransfected control vs. E6 alone (ATRX_NoVector)
    - [NoATRX_Ctrl_vs_ATRX_NoVector, ATRX_NoVector, NoATRX_Ctrl]
    # Compare E6 alone vs. empty vector control
    - [ATRX_NoVector_vs_ATRX_EmptyVector, ATRX_EmptyVector, ATRX_NoVector]
    # Compare empty vector vs. ATRX full-length
    - [ATRX_EmptyVector_vs_ATRX_FL, ATRX_FL, ATRX_EmptyVector]
    # Compare empty vector vs. ATRX in-frame fusion
    - [ATRX_EmptyVector_vs_ATRX_IFF, ATRX_IFF, ATRX_EmptyVector]
    # Compare ATRX in-frame fusion vs. ATRX full-length (FL as reference)
    - [ATRX_IFF_vs_ATRX_FL, ATRX_IFF, ATRX_FL]
    # Combined vector-control contrasts (ATRX_Ctrl = NoVector + EmptyVector merged)
    - [ATRX_Ctrl_vs_ATRX_FL, ATRX_FL, ATRX_Ctrl]
    - [ATRX_Ctrl_vs_ATRX_IFF, ATRX_IFF, ATRX_Ctrl]

  # ─── Combined / derived conditions ─────────────────────────────────────────
  # Optional: merge two or more existing condition labels into one new label
  # for DESeq2 grouping.  Samples are NOT averaged; they remain separate
  # replicates — only their condition label is changed.
  #
  # Rules:
  #   - The combined name must not collide with any existing condition label.
  #   - Every source condition must exist in at least one sample.
  #   - A source condition may appear in multiple combined groups, as long as
  #     those groups are not both used in the same contrast.
  #   - A raw condition used on one side of a contrast must not also be a source
  #     member of the combined group on the other side.
  combine_conditions:
    ATRX_Ctrl:
      - ATRX_NoVector
      - ATRX_EmptyVector

  # Adjusted p-value threshold for volcano plots and result tables
  padj_threshold: 0.05
  # Absolute log2 fold-change threshold for volcano plots
  lfc_threshold: 1.0

# ─── Optional proteomics limma overlay for DESeq2 volcano plots ──────────────
Proteomics:
  enabled: False
  limma_xlsx: /path/to/proteomics_results.xlsx
  sheet: "limma result"
  gene_column: "Gene"
  comparison_column: "Comparison"
  fdr_column: "FDR"
  logfc_column: "logFC"
  fdr_threshold: 0.05
  deseq2_to_proteomics_comparison: {}
  # Example:
  # deseq2_to_proteomics_comparison:
  #   ATRX_IFF_vs_ATRX_FL: "IFF_vs_FL"
  #   ATRX_Ctrl_vs_ATRX_IFF: "IFF_vs_Ctrl"

# ─── GSEA parameters ─────────────────────────────────────────────────────────
GSEA:
  collections:
    - H
    - C2:CP:REACTOME
    - C5:GO:BP
  min_size: 9
  max_size: 500
  nperm: 1000
  rank_metric: stat
  custom_gmt_files: []

# ─── GO enrichment parameters ────────────────────────────────────────────────
GO:
  ontology:
    - BP
  padj_cutoff: 0.05
  min_gs_size: 10
  max_gs_size: 500
  gene_id_type: SYMBOL

# ─── Contrast comparisons ────────────────────────────────────────────────────
# "Normalise" IFF-vs-FL by subtracting the IFF-vs-Ctrl baseline.
ContrastComparisons:
  - name: IFF_vs_FL_normalised_by_IFF_vs_Ctrl
    contrast_A: ATRX_IFF_vs_ATRX_FL
    contrast_B: ATRX_Ctrl_vs_ATRX_IFF
    delta_nes: True
    residual_rank: True

# ─── Tool parameters ─────────────────────────────────────────────────────────
TrimGalore:
  # Minimum read length to keep after trimming
  min_length: 20
  # Phred quality score threshold
  quality: 20
  # Extra arguments forwarded to Trim Galore (e.g. "--illumina" to force adapter)
  extra: ""

STAR:
  # Extra arguments forwarded to STAR genome generate
  index_extra: ""
  # Extra arguments forwarded to STAR aligner
  align_extra: ""

featureCounts:
  # Minimum mapping quality for a read to be counted
  min_mq: 10
  # Extra arguments forwarded to featureCounts
  extra: ""
