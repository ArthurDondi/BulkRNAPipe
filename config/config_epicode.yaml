# BulkRNAPipe configuration file
#
# Copy this file and edit it for your experiment before running the pipeline.
# Point --configfile to your copy when calling snakemake.

# ─── User paths ──────────────────────────────────────────────────────────────
User:
  # Directory that contains your raw FASTQ files (or SRA accessions – see below)
  input_dir: /home/arthur_d/bioinf_isilon/Research/TASCHNERMANDL/Internal/data/Epicode.bulkRNA
  # All pipeline outputs will be written here
  output_dir: /scratch/research/taschnermandl/arthur_d/epicode/analysis/BulkRNA

# ─── Reference genome ────────────────────────────────────────────────────────
Reference:
  # Path to the genome FASTA (used to build the STAR index)
  genome_fasta: /home/arthur_d/bioinf_isilon/Research/TASCHNERMANDL/Internal/users/arthur_d/ressources/references/hg38/epicode/hg38_plus_vectors.fa
  # Path to the gene annotation GTF (used for STAR index and featureCounts)
  gtf: /home/arthur_d/bioinf_isilon/Research/TASCHNERMANDL/Internal/users/arthur_d/ressources/references/hg38/epicode/hg38_plus_vectors.gtf
  # Directory where the STAR index will be stored (created automatically)
  star_index: /home/arthur_d/bioinf_isilon/Research/TASCHNERMANDL/Internal/users/arthur_d/ressources/references/hg38/epicode/star_index
  # Genome name for reporting purposes (e.g. hg38, mm10, GRCh38)
  genome: hg38

# ─── Pipeline modules to enable ──────────────────────────────────────────────
Run:
  # Run FastQC + MultiQC on raw reads
  QC_raw: True
  # Run adapter and quality trimming with Trim Galore
  trim: True
  # Run FastQC + MultiQC on trimmed reads
  QC_trimmed: True
  # Align reads with STAR
  align: True
  # Quantify reads with featureCounts (Subread)
  quantify: True
  # Perform differential expression analysis with DESeq2
  deseq2: True
  # Run GSEA (fgsea) enrichment analysis per contrast
  gsea: True
  # Run GO enrichment analysis (clusterProfiler) per contrast
  go: True

# ─── Sequencing library ───────────────────────────────────────────────────────
Library:
  # True = paired-end reads, False = single-end reads
  paired_end: True
  # Expected read length (used to compute sjdbOverhang = read_length - 1 for STAR)
  read_length: 150
  # Strand specificity for featureCounts:
  #   0 = unstranded, 1 = stranded, 2 = reversely stranded (dUTP/TruSeq)
  strandedness: 2

# ─── Samples ─────────────────────────────────────────────────────────────────
# Each entry key is the sample name used throughout the pipeline.
# condition: label used for grouping in DESeq2
# R1 / R2: FASTQ file names relative to input_dir (just the filename, no path)
